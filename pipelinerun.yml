apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: ci-cd-run-
spec:
  pipelineRef:
    name: ci-cd-pipeline
  params:
    - name: git-url
      value: https://github.com/arifatalya/ci-cd-final-project.git
    - name: git-revision
      value: main
    - name: app-name
      value: ci-cd-final-project
    - name: build-image
      value: image-registry.openshift-image-registry.svc:5000/$(context.pipelineRun.namespace)/ci-cd-final-project:latest
  workspaces:
    - name: output
      persistentVolumeClaim:
        claimName: oc-lab-pvc